  <script>
    (function () {
      const track   = document.getElementById('bannerTrack');
      const counter = document.getElementById('bannerCounter');
      const wrap    = document.querySelector('.banner-wrap');
      const SLIDE_W = 288;
      const TOTAL   = 10;
      const THRESH  = 50;

      // 앞뒤에 클론 삽입: [clone_last, 1~10, clone_first]
      const links      = Array.from(track.querySelectorAll('.banner-link'));
      const firstClone = links[0].cloneNode(true);
      const lastClone  = links[TOTAL - 1].cloneNode(true);
      track.appendChild(firstClone);
      track.insertBefore(lastClone, links[0]);

      let current = 1; // 실제 첫 슬라이드 위치
      let timer;

      function setPos(index, animate) {
        track.style.transition = animate ? 'transform 0.4s ease' : 'none';
        track.style.transform  = `translateX(-${index * SLIDE_W}px)`;
      }

      function updateCounter(index) {
        let d = index;
        if (index === 0)         d = TOTAL;
        if (index === TOTAL + 1) d = 1;
        counter.textContent = `${d}/${TOTAL} +`;
      }

      function goTo(index) {
        current = index;
        setPos(current, true);
        updateCounter(current);
      }

      // 클론에 도달하면 조용히 실제 슬라이드로 점프
      track.addEventListener('transitionend', () => {
        if (current === 0) {
          current = TOTAL;
          setPos(current, false);
          updateCounter(current);
        } else if (current === TOTAL + 1) {
          current = 1;
          setPos(current, false);
          updateCounter(current);
        }
      });

      function resetTimer() {
        clearInterval(timer);
        timer = setInterval(() => goTo(current + 1), 3000);
      }

      // 초기화
      setPos(current, false);
      updateCounter(current);
      resetTimer();

      // 백그라운드 복귀 시 누적 콜백 방지
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          clearInterval(timer);
        } else {
          setPos(current, false);
          resetTimer();
        }
      });

      // ─── 드래그 / 스와이프 ────────────────────────────────
      let isDragging    = false;
      let didDrag       = false;
      let startX        = 0;
      let baseTranslate = 0;

      function onStart(x) {
        isDragging    = true;
        didDrag       = false;
        startX        = x;
        baseTranslate = -current * SLIDE_W;
        track.style.transition = 'none';
        wrap.classList.add('is-dragging');
        clearInterval(timer);
      }

      function onMove(x) {
        if (!isDragging) return;
        if (Math.abs(x - startX) > 5) didDrag = true;
        track.style.transform = `translateX(${baseTranslate + (x - startX)}px)`;
      }

      function onEnd(x) {
        if (!isDragging) return;
        isDragging = false;
        wrap.classList.remove('is-dragging');
        const diff = x - startX;
        if      (diff < -THRESH) goTo(current + 1);
        else if (diff >  THRESH) goTo(current - 1);
        else setPos(current, true);
        resetTimer();
      }

      // 드래그 후 클릭 이벤트로 링크 열리는 것 방지
      wrap.addEventListener('click', e => {
        if (didDrag) e.preventDefault();
      }, true);

      wrap.addEventListener('mousedown',  e => onStart(e.clientX));
      window.addEventListener('mousemove', e => onMove(e.clientX));
      window.addEventListener('mouseup',   e => onEnd(e.clientX));

      wrap.addEventListener('touchstart', e => onStart(e.touches[0].clientX),       { passive: true });
      wrap.addEventListener('touchmove',  e => onMove(e.touches[0].clientX),        { passive: true });
      wrap.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX));

      track.addEventListener('dragstart', e => e.preventDefault());
    })();
  </script>

        <feComposite operator="in" in2="maskedNoise" in="noiseColor" result="coloredNoise"/>
        <feMerge>
          <feMergeNode in="SourceGraphic"/>
          <feMergeNode in="coloredNoise"/>

  <script>
    // ─── 온보딩 가이드: 배너 영역 ─────────────────────────────
    (function () {
      const bannerWrap  = document.querySelector('.banner-wrap');
      const overlay     = document.getElementById('guideOverlay');
      const dimWrap     = document.getElementById('guideDimWrap');
      const W = 320, H = 572;

      function showGuide() {
        const bodyRect   = document.body.getBoundingClientRect();
        const bannerRect = bannerWrap.getBoundingClientRect();
        const t = Math.round(bannerRect.top  - bodyRect.top);
        const l = Math.round(bannerRect.left - bodyRect.left);
        const w = Math.round(bannerRect.width);
        const h = Math.round(bannerRect.height);
        const r = 10; // 배너 border-radius

        // 둥근 구멍: 반시계방향 rounded rect (sweep-flag=0)
        const hole =
          `M${l} ${t+r} ` +
          `L${l} ${t+h-r} A${r} ${r} 0 0 0 ${l+r} ${t+h} ` +
          `L${l+w-r} ${t+h} A${r} ${r} 0 0 0 ${l+w} ${t+h-r} ` +
          `L${l+w} ${t+r} A${r} ${r} 0 0 0 ${l+w-r} ${t} ` +
          `L${l+r} ${t} A${r} ${r} 0 0 0 ${l} ${t+r} Z`;

        dimWrap.style.clipPath = `path('M0 0 L${W} 0 L${W} ${H} L0 ${H} Z ${hole}')`;
        overlay.classList.add('active', 'banner-active');
      }

      function hideGuide() {
        overlay.classList.remove('active', 'banner-active');
      }

      bannerWrap.addEventListener('mouseenter', showGuide);
      bannerWrap.addEventListener('mouseleave', hideGuide);
    })();
  </script>

  <script>

    (function () {

      function showAssetGuide() {

        const boxRect   = assetBox.getBoundingClientRect();
        const item1Rect = assetItems[1].getBoundingClientRect(); // 마일리지 (두 번째)

        const t = Math.round(boxRect.top  - bodyRect.top);
        const l = Math.round(boxRect.left - bodyRect.left);
        const h = Math.round(boxRect.height);
        const r = 8; // asset-box border-radius

        // 하이라이트 오른쪽 끝: 마일리지 오른쪽 + gap 절반(7px)
        const rightEdge = Math.round(item1Rect.right - bodyRect.left) + 7;
        const w = rightEdge - l;

        const hole =
          `M${l} ${t+r} ` +
          `L${l} ${t+h-r} A${r} ${r} 0 0 0 ${l+r} ${t+h} ` +
          `L${l+w-r} ${t+h} A${r} ${r} 0 0 0 ${l+w} ${t+h-r} ` +
          `L${l+w} ${t+r} A${r} ${r} 0 0 0 ${l+w-r} ${t} ` +
          `L${l+r} ${t} A${r} ${r} 0 0 0 ${l} ${t+r} Z`;

        dimWrap.style.clipPath = `path('M0 0 L${W} 0 L${W} ${H} L0 ${H} Z ${hole}')`;
        overlay.classList.add('active', 'asset-active');
      }

      function hideAssetGuide() {
        overlay.classList.remove('active', 'asset-active');
      }

      assetBox.addEventListener('mouseenter', showAssetGuide);
      assetBox.addEventListener('mouseleave', hideAssetGuide);
    })();
  </script>

  <script>
    // ─── 온보딩 가이드: MY PC방 + QR 영역 ──────────────────────
    (function () {
      const mypcRow = document.querySelector('.mypc-row');
      const overlay = document.getElementById('guideOverlay');
      const dimWrap = document.getElementById('guideDimWrap');
      const W = 320, H = 572;

      function makeHole(rect, bodyRect, r) {
        const t = Math.round(rect.top  - bodyRect.top);
        const l = Math.round(rect.left - bodyRect.left);
        const w = Math.round(rect.width);
        const h = Math.round(rect.height);
        return (
          `M${l} ${t+r} ` +
          `L${l} ${t+h-r} A${r} ${r} 0 0 0 ${l+r} ${t+h} ` +
          `L${l+w-r} ${t+h} A${r} ${r} 0 0 0 ${l+w} ${t+h-r} ` +
          `L${l+w} ${t+r} A${r} ${r} 0 0 0 ${l+w-r} ${t} ` +
          `L${l+r} ${t} A${r} ${r} 0 0 0 ${l} ${t+r} Z`
        );
      }

      function showMypcGuide() {
        const bodyRect = document.body.getBoundingClientRect();
        const hole1 = makeHole(mypcRow.querySelector('.mypc-card').getBoundingClientRect(), bodyRect, 8);
        const hole2 = makeHole(mypcRow.querySelector('.qr-card').getBoundingClientRect(),  bodyRect, 8);

        dimWrap.style.clipPath = `path('M0 0 L${W} 0 L${W} ${H} L0 ${H} Z ${hole1} ${hole2}')`;
        overlay.classList.add('active', 'mypc-active');
      }

      function hideMypcGuide() {
        overlay.classList.remove('active', 'mypc-active');
      }

      mypcRow.addEventListener('mouseenter', showMypcGuide);
      mypcRow.addEventListener('mouseleave', hideMypcGuide);
    })();
  </script>

  <script>

      const W = 320, H = 572;

      function showIconGuide() {
        const bodyRect = document.body.getBoundingClientRect();
        const cards    = iconCards.querySelectorAll('.icon-card');
        const holes    = Array.from(cards).map(c => {
          const rect = c.getBoundingClientRect();
          const t = Math.round(rect.top  - bodyRect.top);
          const l = Math.round(rect.left - bodyRect.left);
          const w = Math.round(rect.width);
          const h = Math.round(rect.height);
          const r = 8;
          return (
            `M${l} ${t+r} ` +
            `L${l} ${t+h-r} A${r} ${r} 0 0 0 ${l+r} ${t+h} ` +
            `L${l+w-r} ${t+h} A${r} ${r} 0 0 0 ${l+w} ${t+h-r} ` +
            `L${l+w} ${t+r} A${r} ${r} 0 0 0 ${l+w-r} ${t} ` +
            `L${l+r} ${t} A${r} ${r} 0 0 0 ${l} ${t+r} Z`
          );
        }).join(' ');

        dimWrap.style.clipPath = `path('M0 0 L${W} 0 L${W} ${H} L0 ${H} Z ${holes}')`;
        overlay.classList.add('active', 'icon-active');
      }

      function hideIconGuide() {

      iconCards.addEventListener('mouseenter', showIconGuide);
